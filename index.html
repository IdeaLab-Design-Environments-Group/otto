<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Otto - Parametric 2D Design System</title>
    <link rel="stylesheet" href="./styles/main.css">

    <!-- CodeMirror Dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/mode/simple.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/comment/comment.min.js"></script>

    <!-- ClipperLib for boolean operations -->
    <script src="https://cdn.jsdelivr.net/gh/junmer/clipper-lib@master/clipper.js"></script>

</head>
<body>
    <a href="#canvas-container" class="skip-link">Skip to canvas</a>

    <!-- Tab Bar Container -->
    <div id="tab-bar-container" class="tab-bar-container">
        <!-- Toolbar buttons -->
        <div class="toolbar-buttons" role="toolbar" aria-label="Main toolbar">
            <button id="btn-save" class="toolbar-btn" title="Save (Ctrl+S)" aria-label="Save" aria-keyshortcuts="Control+S">
                Save
            </button>
            <button id="btn-load" class="toolbar-btn" title="Load" aria-label="Load">
                Load
            </button>
            <button id="btn-export" class="toolbar-btn" title="Export File (Ctrl+O)" aria-label="Export file" aria-keyshortcuts="Control+O">
                Export
            </button>
            <button id="btn-import" class="toolbar-btn" title="Import File" aria-label="Import file">
                Import
            </button>
            <button id="btn-import-stl" class="toolbar-btn" title="Import an STL as a 2.5D footprint" aria-label="Import STL">
                STL
            </button>
            <div class="toolbar-separator" role="separator" aria-orientation="vertical"></div>
            <button id="btn-undo" class="toolbar-btn" title="Undo (Ctrl+Z)" aria-label="Undo" aria-keyshortcuts="Control+Z">
                Undo
            </button>
            <button id="btn-redo" class="toolbar-btn" title="Redo (Ctrl+Y)" aria-label="Redo" aria-keyshortcuts="Control+Y">
                Redo
            </button>
            <div class="toolbar-separator" role="separator" aria-orientation="vertical"></div>
            <button id="btn-free-draw" class="toolbar-btn" title="Path Tool" aria-label="Path tool" aria-pressed="false">
                Path
            </button>
        </div>
    </div>

    <!-- Polite live region for app notifications (Saved, errors, …) -->
    <div id="notification-region" role="status" aria-live="polite" class="visually-hidden"></div>

    <!-- Main Layout -->
    <main class="main-layout" aria-label="Design workspace">
        <!-- Left Panel -->
        <div id="left-panel" class="panel left-panel" role="complementary" aria-label="Authoring tools">
            <div class="panel-header">
                <div class="panel-tabs" role="tablist" aria-label="Authoring mode">
                    <button class="panel-tab active" type="button" role="tab" id="tab-library" aria-selected="true" aria-controls="shape-library-container" data-panel="library">Library</button>
                    <button class="panel-tab" type="button" role="tab" id="tab-blocks" aria-selected="false" aria-controls="blockly-container" data-panel="blocks">Blocks</button>
                    <button class="panel-tab" type="button" role="tab" id="tab-code" aria-selected="false" aria-controls="code-editor-container" data-panel="code">Code</button>
                </div>
            </div>
            <div id="shape-library-container" class="panel-content panel-content-tab" role="tabpanel" aria-labelledby="tab-library" data-panel="library"></div>
            <div id="blockly-container" class="panel-content panel-content-tab is-hidden" role="tabpanel" aria-labelledby="tab-blocks" data-panel="blocks"></div>
            <div id="code-editor-container" class="panel-content panel-content-tab is-hidden" role="tabpanel" aria-labelledby="tab-code" data-panel="code"></div>
        </div>

        <!-- Left Resize Handle -->
        <div class="resize-handle resize-handle-vertical" data-resize="left"></div>

        <!-- Center Canvas Area -->
        <div id="canvas-container" class="canvas-container">
            <canvas id="main-canvas" tabindex="0" role="application"
                    aria-label="Design canvas. Drag with one finger to pan and pinch with two fingers to zoom. Use arrow keys to move the selected shape, Tab to cycle shapes, Delete to remove.">
            </canvas>
            <!-- Visually-hidden live region announcing selection changes -->
            <div id="canvas-status" role="status" aria-live="polite" class="visually-hidden"></div>
            <!-- Zoom Controls -->
            <div id="zoom-controls-container" class="zoom-controls-container"></div>
        </div>

        <!-- Right Resize Handle -->
        <div class="resize-handle resize-handle-vertical" data-resize="right"></div>

        <!-- Right Panel -->
        <div id="right-panel" class="panel right-panel" role="complementary" aria-label="Inspector">
            <div class="panel-header">
                <h3 id="properties-heading">Properties</h3>
            </div>
            <div id="properties-panel-container" class="panel-content" role="region" aria-labelledby="properties-heading"></div>

            <div class="panel-header">
                <h3 id="parameters-heading">Parameters</h3>
            </div>
            <div id="parameters-menu-container" class="panel-content" role="region" aria-labelledby="parameters-heading"></div>
        </div>
    </main>

    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
